name: TMAS Image Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  tmas-backend-image:
    name: TMAS Scan Backend Image
    runs-on: ubuntu-22.04
    steps:
      - name: TMAS scan backend image
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          version: '2'
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          artifact: registry:drdro28/trendo-backend:0.3.3
          additionalArgs: --region=eu-central-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  tmas-frontend-image:
    name: TMAS Scan Frontend Image
    runs-on: ubuntu-22.04
    steps:
      - name: TMAS scan frontend image
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          version: '2'
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          artifact: registry:drdro28/trendo-frontend:0.1.3
          additionalArgs: --region=eu-central-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
