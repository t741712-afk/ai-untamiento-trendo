apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trendo-ingress
  namespace: trendo-demo
spec:
  ingressClassName: nginx
  rules:
    - host: ai-untamiento.trendo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
